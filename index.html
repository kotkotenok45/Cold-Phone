<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Cooler Pro</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #050a15;
            color: #00d4ff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            border: 2px solid #00d4ff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            max-width: 400px;
        }

        h1 { margin-top: 0; font-size: 28px; text-transform: uppercase; }
        
        .warning {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4d4d;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #ff4d4d;
        }

        .status-dot {
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        .active-dot {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: blink 1s infinite;
        }

        button {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-start { background: #00d4ff; color: #000; }
        .btn-stop { background: #333; color: #fff; display: none; }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sonic Cooler</h1>
    
    <div class="warning">
        <b>ВНИМАНИЕ:</b> Для работы должны быть <b>стерео-динамики</b>. Также <b>отключитесь от колонок</b>. Желательно, чтобы на вашем смартфоне была <b>слабая влагозащита</b> для лучшего выхода воздуха.
    </div>

    <p><span id="dot" class="status-dot"></span> СТАТУС: <span id="statusText">ГОТОВ К ЗАПУСКУ</span></p>

    <button class="btn-start" id="startBtn" onclick="startCooling()">ЗАПУСТИТЬ ПРОДУВ</button>
    <button class="btn-stop" id="stopBtn" onclick="stopCooling()">ОСТАНОВИТЬ</button>

    <p style="font-size: 12px; color: #666; margin-top: 20px;">
        Установите громкость на 100%. <br>
        Используется агрессивная квадратная волна 165 Гц.
    </p>
</div>

<script>
    let audioCtx;
    let oscillator;
    let gainNode;

    function startCooling() {
        try {
            // Создаем аудио контекст
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            // Квадратная волна создает максимальный "толчок" воздуха
            oscillator.type = 'square'; 
            oscillator.frequency.setValueAtTime(165, audioCtx.currentTime); 

            // Громкость на максимум
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); 

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();

            // Обновляем UI
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('dot').classList.add('active-dot');
            document.getElementById('statusText').innerText = 'АКТИВНОЕ ОХЛАЖДЕНИЕ';
            document.getElementById('statusText').style.color = '#00ff00';

        } catch (e) {
            alert('Ошибка запуска аудио: ' + e);
        }
    }

    function stopCooling() {
        if (oscillator) {
            oscillator.stop();
            oscillator.disconnect();
            
            // Сброс UI
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('dot').classList.remove('active-dot');
            document.getElementById('statusText').innerText = 'ГОТОВ К ЗАПУСКУ';
            document.getElementById('statusText').style.color = '#00d4ff';
        }
    }
</script>

</body>
</html>
